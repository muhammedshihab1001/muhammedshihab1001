<svg width="100%" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a192f">
        <animate attributeName="stop-color"
                 values="#0a192f;#112240;#1f6feb;#00c6ff;#0a192f"
                 dur="15s"
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1f6feb">
        <animate attributeName="stop-color"
                 values="#1f6feb;#00f2fe;#112240;#0a192f;#1f6feb"
                 dur="15s"
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <rect width="1200" height="340" fill="url(#bg)" rx="20"/>

  <text x="50%" y="42%" text-anchor="middle"
        font-size="46"
        font-family="Segoe UI, sans-serif"
        fill="#ffffff"
        filter="url(#glow)">
    Muhammed Shihab P
    <animate attributeName="opacity" values="0;1" dur="2s" fill="freeze"/>
  </text>

  <text x="50%" y="62%" text-anchor="middle"
        font-size="20"
        font-family="Segoe UI, sans-serif"
        fill="#00f2fe">
    Machine Learning Engineer • AI Systems • MLOps • Backend
    <animate attributeName="opacity" values="0;1" dur="3s" fill="freeze"/>
  </text>

</svg>
