<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="contactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="220" fill="#0d1117" rx="20"/>

  <!-- Wave Animation -->
  <path fill="url(#contactGrad)" opacity="0.08">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      values="
      M0,120 C250,180 750,60 1000,120 L1000,220 L0,220 Z;
      M0,100 C250,40 750,200 1000,100 L1000,220 L0,220 Z;
      M0,120 C250,180 750,60 1000,120 L1000,220 L0,220 Z" />
  </path>

  <!-- Title -->
  <text x="50%" y="90" text-anchor="middle"
        font-size="38"
        font-family="Segoe UI"
        fill="url(#contactGrad)"
        filter="url(#glow)">
    Let's Connect
  </text>

  <!-- Subtitle -->
  <text x="50%" y="130"
        text-anchor="middle"
        font-size="16"
        font-family="Segoe UI"
        fill="#8b949e">
    Open to collaborations • AI Engineering • Scalable Systems
  </text>

</svg>